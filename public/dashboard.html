<!DOCTYPE html>
<html>
<head><title>Dashboard</title></head>
<body>
  <h2>Dashboard</h2>
  <div id="result"></div>
  <br>
  <button onclick="goTo('/api/admin')">Admin Page</button>
  <button onclick="goTo('/api/manager')">Manager Page</button>
  <button onclick="goTo('/api/profile')">Profile Page</button>

  <script>
    const token = localStorage.getItem('token');

    fetch('/api/dashboard', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => r.json()).then(d => document.getElementById('result').innerText = d.message);

    async function goTo(url) {
      const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      alert(JSON.stringify(data));
    }
  </script>
</body>
</html>
