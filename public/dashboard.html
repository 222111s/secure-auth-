<!DOCTYPE html>
<html>
<head><title>Dashboard</title></head>
<body>
  <h2>Dashboard</h2>
  <div id="result"></div>
  <br>
  <button onclick="window.location.href='/admin.html'">Admin Page</button>
  <button onclick="window.location.href='/manager.html'">Manager Page</button>
  <button onclick="window.location.href='/profile.html'">Profile Page</button>
  <br><br>
  <button onclick="logout()">Logout</button>

  <script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');

    if (!token) window.location.href = '/login.html';

    fetch('/api/dashboard', {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(r => r.json())
    .then(d => {
      document.getElementById('result').innerText = d.message + ' | Role: ' + role;
    });

    function logout() {
      localStorage.clear();
      window.location.href = '/login.html';
    }
  </script>
</body>
</html>
